<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>BIGLIGHT 管理画面</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<style>
  :root{--navy:#0b3d91;--blue:#1e6fd6;--gold:#f5a623;--ink:#1f2a3a;--muted:#64748b;--line:rgba(0,0,0,.08);--bg:#f4f6f9}
  *{margin:0;box-sizing:border-box}
  body{font-family:"Helvetica Neue","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;color:var(--ink);background:var(--bg)}
  a{color:var(--blue);text-decoration:none}
  button{font-family:inherit}
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#071e46,#0b3d91)}
  .lcard{background:#fff;border-radius:16px;padding:44px 40px;width:100%;max-width:380px;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.3)}
  .lcard .mark{font-size:22px;font-weight:800;color:var(--navy);letter-spacing:4px}
  .lcard .sub{font-size:13px;color:var(--muted);margin:6px 0 28px}
  #gbtn{display:flex;justify-content:center}
  .lerr{color:#e23b3b;font-size:13px;margin-top:16px;min-height:18px}
  #app{display:none;min-height:100vh;grid-template-columns:230px 1fr}
  .side{background:#071e46;color:#cfe0f7;padding:22px 16px;display:flex;flex-direction:column}
  .side .brand{color:#fff;font-weight:800;letter-spacing:3px;font-size:18px;padding:6px 10px 22px}
  .side .brand small{display:block;font-size:11px;color:var(--gold);letter-spacing:2px;font-weight:600;margin-top:2px}
  .nav a{display:flex;align-items:center;gap:10px;color:#cfe0f7;padding:12px 14px;border-radius:10px;font-size:14px;cursor:pointer;margin-bottom:4px}
  .nav a:hover,.nav a.active{background:#ffffff14;color:#fff}
  .nav a .badge{margin-left:auto;background:var(--gold);color:#3d2b00;font-size:11px;font-weight:700;border-radius:20px;padding:1px 8px}
  .side .me{margin-top:auto;border-top:1px solid #ffffff1f;padding-top:16px;font-size:12.5px;color:#aec6ee}
  .side .me img{width:30px;height:30px;border-radius:50%;vertical-align:middle;margin-right:8px}
  .side .logout{display:inline-block;margin-top:12px;color:#9db8e0;font-size:12.5px;cursor:pointer}
  .main{padding:28px 34px;overflow:auto}
  .h1{font-size:22px;color:var(--navy);font-weight:700;margin-bottom:4px}
  .crumb{font-size:12.5px;color:var(--muted);margin-bottom:24px}
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:30px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px}
  .stat .n{font-size:30px;font-weight:800;color:var(--navy)}
  .stat .l{font-size:12.5px;color:var(--muted);margin-top:4px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:14px;padding:26px}
  .panel h3{font-size:16px;color:var(--navy);margin-bottom:6px}
  .panel p{font-size:13.5px;color:var(--muted);line-height:1.8}
  .toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .tab{border:1px solid var(--line);background:#fff;border-radius:20px;padding:7px 16px;font-size:13px;color:var(--muted);cursor:pointer}
  .tab.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;color:var(--ink)}
  .btn.gold{background:var(--gold);border-color:var(--gold);color:#3d2b00;font-weight:700}
  .btn.navy{background:var(--navy);border-color:var(--navy);color:#fff;font-weight:600}
  .tablewrap{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:auto}
  table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:680px}
  th,td{padding:12px 14px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
  th{background:#f1f5fb;color:var(--navy);font-weight:700;white-space:nowrap;font-size:12.5px}
  tr:last-child td{border-bottom:0}
  td .msg{max-width:420px;white-space:pre-wrap;color:#3a4658;line-height:1.6}
  td .msg.clamp{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mtoggle{margin-top:5px;display:inline-block;padding:0;font-size:12px}
  td .sub{color:var(--muted);font-size:12px}
  .pill{font-size:11px;font-weight:700;border-radius:20px;padding:3px 10px}
  .pill.new{background:#fdeccb;color:#9a5b00}.pill.replied{background:#e7eefb;color:var(--navy)}.pill.done{background:#e2f4ea;color:#1c7a47}
  .pill.draft{background:#eceff3;color:#64748b}.pill.published{background:#e2f4ea;color:#1c7a47}
  select.st{font-family:inherit;font-size:12.5px;padding:5px 8px;border:1px solid var(--line);border-radius:8px}
  .del{color:#e23b3b;cursor:pointer;font-size:12.5px;background:none;border:0}
  .lnk{color:var(--blue);cursor:pointer;font-size:12.5px;background:none;border:0;margin-right:10px}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  /* editor form */
  .form{background:#fff;border:1px solid var(--line);border-radius:14px;padding:26px;max-width:1000px}
  .fg{margin-bottom:18px}
  .fg label{display:block;font-size:13px;font-weight:600;color:var(--navy);margin-bottom:6px}
  .fg .hint{font-size:11.5px;color:var(--muted);font-weight:400;margin-left:6px}
  .fg input,.fg textarea,.fg select{width:100%;border:1px solid #cfd8e6;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit}
  .fg textarea{min-height:70px;resize:vertical}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  #qeditor{background:#fff}
  #qeditor .ql-editor{min-height:300px;max-height:520px;overflow-y:auto;resize:vertical}
  .ql-toolbar.ql-snow,.ql-container.ql-snow{border-color:#cfd8e6}
  .ql-container{font-size:15px;font-family:inherit}
  .ql-editor table{border-collapse:collapse;width:100%;margin:10px 0;font-size:13px}
  .ql-editor th,.ql-editor td{border:1px solid #cbd5e1;padding:6px 10px;text-align:left}
  .ql-editor th{background:#f1f5fb;font-weight:700}
  .ql-editor .nbody-tablewrap{overflow-x:auto}
  .mdbox{border:1px dashed #b9c6db;border-radius:10px;background:#f6f9fe;padding:12px 14px;margin-bottom:6px}
  .mdbox .mdhint{font-size:11.5px;color:#5a6b85;margin-bottom:8px;line-height:1.7}
  .mdbox textarea{width:100%;min-height:90px;border:1px solid #cfd8e6;border-radius:8px;padding:10px 12px;font-size:13px;font-family:inherit;resize:vertical}
  .formbtns{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
  .serp{border:1px solid #e3e8ef;border-radius:10px;padding:14px 16px;background:#fff;max-width:600px}
  .serp-url{font-size:12.5px;color:#202124}.serp-title{color:#1a0dab;font-size:18px;line-height:1.3;margin:3px 0}.serp-desc{font-size:13px;color:#4d5156;line-height:1.6}
  .cwarn{color:#e23b3b!important}.cok{color:#1c7a47!important}
  .upbox{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .upbtn{display:inline-block;border:1.5px dashed #bcc8da;border-radius:10px;padding:13px 18px;font-size:13px;color:var(--navy);background:#f7f9fc;cursor:pointer;font-weight:600;white-space:nowrap}
  .upbtn:hover{background:#eef3fb}
  .upprev{width:150px;height:94px;border-radius:8px;object-fit:cover;border:1px solid var(--line);display:none}
  .upprev.on{display:block}
  .tagwrap{display:flex;flex-wrap:wrap;gap:7px;border:1px solid #cfd8e6;border-radius:8px;padding:8px 10px}
  .tagwrap input{border:none;outline:none;flex:1;min-width:130px;font-size:14px;padding:4px;width:auto}
  .chip{display:inline-flex;align-items:center;gap:6px;background:#eef4fc;color:var(--navy);border-radius:16px;padding:4px 6px 4px 11px;font-size:12.5px;font-weight:600}
  .chip b{cursor:pointer;color:#9aa3b2;font-size:14px;line-height:1}
  .tagsug{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
  .tagsug span{font-size:11.5px;color:#5a6b85;background:#f1f5fb;border-radius:14px;padding:3px 10px;cursor:pointer}
  .tagsug span:hover{background:#e2eaf7}
  .seobox{border:1px solid var(--line);border-radius:12px;padding:16px 18px;background:#fbfcfe}
  .seoscore{display:flex;align-items:center;gap:14px;margin-bottom:14px}
  .seoring{font-size:28px;font-weight:800;line-height:1;white-space:nowrap}
  .seobar{flex:1;height:10px;background:#e9eef5;border-radius:6px;overflow:hidden}
  .seobar i{display:block;height:100%;border-radius:6px;transition:width .3s,background .3s}
  .seochk{list-style:none;margin:0;padding:0;display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .seochk li{font-size:12.5px;color:#94a3b8}.seochk li.ok{color:#1c7a47}.seochk li.no{color:#b4884a}
  .catmgr{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px}
  .catmgr .clist{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .catmgr .citem{display:inline-flex;align-items:center;gap:8px;background:#f1f5fb;border-radius:8px;padding:6px 8px 6px 12px;font-size:13px}
  .catmgr .citem .del{font-size:15px;line-height:1}
  .catmgr .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  @media(max-width:760px){#app{grid-template-columns:1fr}.side{flex-direction:row;flex-wrap:wrap;align-items:center}.side .me{margin:0 0 0 auto;border:0;padding:0}.cards{grid-template-columns:repeat(2,1fr)}.row2{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="login">
  <div class="lcard">
    <div class="mark">BIGLIGHT</div>
    <div class="sub">管理画面 / Admin</div>
    <div id="gbtn"></div>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<div id="app">
  <aside class="side">
    <div class="brand">BIGLIGHT<small>ADMIN</small></div>
    <nav class="nav">
      <a class="active" data-page="dashboard">📊 ダッシュボード</a>
      <a data-page="inquiries">✉️ お問い合わせ <span class="badge" id="nbInq" style="display:none">0</span></a>
      <a data-page="downloads">📥 資料請求</a>
      <a data-page="posts">📝 お知らせ・Magazine</a>
    </nav>
    <div class="me" id="me"></div>
  </aside>
  <main class="main" id="main"></main>
</div>

<script>
const $ = s => document.querySelector(s);
const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const ST = { new:'未対応', replied:'対応中', done:'完了' };
const CAT = { news:'お知らせ', magazine:'HR Magazine', seido:'制度・法改正情報', press:'プレス' };
let CATEGORIES=[];
async function api(p,opt){ return fetch(p,Object.assign({headers:{'Content-Type':'application/json'}},opt)); }
async function loadCats(){ try{ CATEGORIES=(await(await api('/api/categories')).json()).items||[]; }catch(e){CATEGORIES=[];}
  if(!CATEGORIES.length) CATEGORIES=[{slug:'news',name:'お知らせ'},{slug:'magazine',name:'HR Magazine'},{slug:'seido',name:'制度・法改正情報'}]; }
function catName(slug){ const c=CATEGORIES.find(x=>x.slug===slug); return c?c.name:(CAT[slug]||slug); }
function readMin(body){ const n=String(body||'').replace(/<[^>]*>/g,'').replace(/\s+/g,'').length; return Math.max(1,Math.round(n/500)); }
function toLocalInput(d){ if(!d) d=new Date(); const t=new Date(d); const p=n=>String(n).padStart(2,'0'); return `${t.getFullYear()}-${p(t.getMonth()+1)}-${p(t.getDate())}T${p(t.getHours())}:${p(t.getMinutes())}`; }
function seoScore(d){
  const t=(d.title||''), m=(d.meta||''), kw=(d.kw||'').trim().toLowerCase(), body=(d.body||'').toLowerCase(), slug=(d.slug||'').toLowerCase();
  const c=[
    {k:'タイトル 30〜60字', ok:t.length>=30&&t.length<=60, w:20},
    {k:'メタ説明 80〜120字', ok:m.length>=80&&m.length<=120, w:20},
    {k:'アイキャッチ画像あり', ok:!!d.cover, w:15},
    {k:'見出し H2/H3 あり', ok:/<h[23]/i.test(d.body||''), w:15},
    {k:'本文にキーワード', ok:!!kw&&body.indexOf(kw)>=0, w:15},
    {k:'URLにキーワード', ok:!!kw&&slug.indexOf(kw.replace(/\s+/g,'-'))>=0, w:15},
  ];
  const score=c.reduce((s,x)=>s+(x.ok?x.w:0),0);
  return {score, checks:c};
}
// Markdown (ChatGPT等) -> HTML : 見出し/太字/箇条書き/表 を自動変換 -> SEO最適化
function md2html(md){
  const lines=String(md||'').replace(/\r/g,'').split('\n');
  let html='',list=null,i=0;
  const closeList=()=>{ if(list){ html+='</'+list+'>'; list=null; } };
  const inl=s=>{ s=String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,'<a href="$2">$1</a>');
    return s; };
  const cells=row=>row.replace(/^\s*\|/,'').replace(/\|\s*$/,'').split('|').map(c=>c.trim());
  while(i<lines.length){ const line=lines[i].trim(); let m;
    if(!line){ closeList(); i++; continue; }
    // 表（| ... | の行 + 区切り行 |---|---| ）
    if(/^\|.*\|$/.test(line) && i+1<lines.length && /^\|[\s:|-]+\|$/.test(lines[i+1].trim())){
      closeList();
      const head=cells(line); i+=2; let body='';
      while(i<lines.length && /^\|.*\|$/.test(lines[i].trim())){ const c=cells(lines[i].trim()); body+='<tr>'+c.map(x=>'<td>'+inl(x)+'</td>').join('')+'</tr>'; i++; }
      html+='<table class="nbody-table"><thead><tr>'+head.map(h=>'<th>'+inl(h)+'</th>').join('')+'</tr></thead><tbody>'+body+'</tbody></table>';
      continue;
    }
    if(m=line.match(/^#{3,}\s+(.*)/)){ closeList(); html+='<h3>'+inl(m[1])+'</h3>'; i++; continue; }
    if(m=line.match(/^##\s+(.*)/)){ closeList(); html+='<h2>'+inl(m[1])+'</h2>'; i++; continue; }
    if(m=line.match(/^#\s+(.*)/)){ closeList(); html+='<h2>'+inl(m[1])+'</h2>'; i++; continue; }
    if(m=line.match(/^[-*・]\s+(.*)/)){ if(list!=='ul'){closeList();html+='<ul>';list='ul';} html+='<li>'+inl(m[1])+'</li>'; i++; continue; }
    if(m=line.match(/^\d+[.)]\s+(.*)/)){ if(list!=='ol'){closeList();html+='<ol>';list='ol';} html+='<li>'+inl(m[1])+'</li>'; i++; continue; }
    if(m=line.match(/^>\s+(.*)/)){ closeList(); html+='<blockquote>'+inl(m[1])+'</blockquote>'; i++; continue; }
    if(m=line.match(/^【(.+)】$/)){ closeList(); html+='<h3>'+inl(m[1])+'</h3>'; i++; continue; }
    closeList(); html+='<p>'+inl(line)+'</p>'; i++;
  }
  closeList(); return html;
}
// Đăng ký blot để Quill GIỮ bảng HTML (mặc định Quill xóa <table>)
let _tableBlotReady=false;
function ensureTableBlot(){
  if(_tableBlotReady||!window.Quill) return;
  const BlockEmbed=Quill.import('blots/block/embed');
  class TableBlot extends BlockEmbed{
    static create(value){ const node=super.create(); node.innerHTML=value; return node; }
    static value(node){ return node.innerHTML; }
  }
  TableBlot.blotName='bltable'; TableBlot.tagName='div'; TableBlot.className='nbody-tablewrap';
  Quill.register(TableBlot,true);
  _tableBlotReady=true;
}
function fmt(d){ if(!d) return '—'; const t=new Date(d); const p=n=>String(n).padStart(2,'0'); return `${t.getFullYear()}/${p(t.getMonth()+1)}/${p(t.getDate())} ${p(t.getHours())}:${p(t.getMinutes())}`; }
function fmtd(d){ if(!d) return '—'; const t=new Date(d); const p=n=>String(n).padStart(2,'0'); return `${t.getFullYear()}/${p(t.getMonth()+1)}/${p(t.getDate())}`; }
function checkedIds(){ return [...document.querySelectorAll('.rowchk:checked')].map(c=>c.value); }
function bindChkAll(){ const a=$('#chkall'); if(a) a.onclick=()=>{ document.querySelectorAll('.rowchk').forEach(c=>c.checked=a.checked); selInfo(); };
  document.querySelectorAll('.rowchk').forEach(c=>c.onchange=()=>{ const all=$('#chkall'); if(all) all.checked=[...document.querySelectorAll('.rowchk')].every(x=>x.checked); selInfo(); }); selInfo(); }
function selInfo(){ const n=checkedIds().length, e=$('#selcnt'); if(e) e.textContent=n?('選択中 '+n+'件'):''; }
async function bulkDelete(base, after){ const ids=checkedIds(); if(!ids.length){ alert('行を選択してください（左のチェックボックス）'); return; } if(!confirm('選択した '+ids.length+' 件を削除しますか？'))return; for(const id of ids){ try{ await api(base+'/'+id,{method:'DELETE'}); }catch(e){} } after(); }

async function boot(){ const me=await(await api('/api/me')).json(); if(me.user) showApp(me.user); else showLogin(); }
async function showLogin(){
  $('#app').style.display='none'; $('#login').style.display='flex';
  const cfg=await(await api('/api/config')).json();
  if(!cfg.googleClientId){ $('#lerr').textContent='GOOGLE_CLIENT_ID chưa cấu hình'; return; }
  const t=()=>{ if(!window.google||!google.accounts) return setTimeout(t,200);
    google.accounts.id.initialize({client_id:cfg.googleClientId,callback:onCred});
    google.accounts.id.renderButton($('#gbtn'),{theme:'filled_blue',size:'large',text:'signin_with',shape:'pill',width:280}); };
  t();
}
async function onCred(resp){ $('#lerr').textContent='';
  const r=await api('/auth/google',{method:'POST',body:JSON.stringify({credential:resp.credential})}); const d=await r.json();
  if(r.ok) showApp(d.user); else $('#lerr').textContent=d.error||'ログインに失敗しました';
}
function showApp(user){
  $('#login').style.display='none'; $('#app').style.display='grid';
  $('#me').innerHTML=(user.picture?`<img src="${user.picture}" referrerpolicy="no-referrer">`:'')+`<span>${esc(user.name||user.email)}</span><div class="logout" id="logout">ログアウト</div>`;
  $('#logout').onclick=async()=>{ await api('/api/logout',{method:'POST'}); location.reload(); };
  document.querySelectorAll('.nav a').forEach(a=>a.onclick=()=>go(a.dataset.page));
  refreshBadge(); loadCats().then(()=>go('dashboard'));
}
function setActive(p){ document.querySelectorAll('.nav a').forEach(a=>a.classList.toggle('active',a.dataset.page===p)); }
async function refreshBadge(){ try{ const s=await(await api('/api/stats')).json(); const nb=$('#nbInq');
  if(s.inquiriesNew>0){nb.style.display='inline-block';nb.textContent=s.inquiriesNew;}else nb.style.display='none'; }catch(e){} }
function go(page){ setActive(page);
  if(page==='dashboard') return renderDashboard();
  if(page==='inquiries') return renderInquiries();
  if(page==='downloads') return renderDownloads();
  if(page==='posts') return renderPosts();
}
async function renderDashboard(){
  let s={inquiriesNew:0,inquiriesTotal:0,postsPublished:0,postsTotal:0,postsDraft:0,downloadsTotal:0,topPosts:[]};
  try{ s=await(await api('/api/stats')).json(); }catch(e){}
  const top=(s.topPosts||[]).filter(p=>p.views>0);
  $('#main').innerHTML=`<div class="h1">ダッシュボード</div><div class="crumb">ようこそ、BIGLIGHT 管理画面へ</div>
    <div class="cards">
      <div class="stat"><div class="n">${s.postsTotal||0}</div><div class="l">記事 合計</div></div>
      <div class="stat"><div class="n">${s.postsPublished||0}</div><div class="l">公開中の記事</div></div>
      <div class="stat"><div class="n">${s.postsDraft||0}</div><div class="l">下書き</div></div>
      <div class="stat"><div class="n">${s.inquiriesNew||0}</div><div class="l">未対応の問い合わせ</div></div>
      <div class="stat"><div class="n">${s.inquiriesTotal||0}</div><div class="l">問い合わせ 合計</div></div>
      <div class="stat"><div class="n">${s.downloadsTotal||0}</div><div class="l">資料請求 合計</div></div>
    </div>
    <div class="panel"><h3>🔥 人気記事 TOP 10（閲覧数）</h3>
      ${top.length?`<div class="tablewrap" style="margin-top:12px"><table><thead><tr><th>#</th><th>タイトル</th><th>状態</th><th style="text-align:right">閲覧数</th></tr></thead><tbody>${top.map((p,i)=>`
        <tr><td>${i+1}</td><td><b>${esc(p.title)}</b><div class="sub">/news/${esc(p.slug)}/</div></td>
        <td><span class="pill ${p.status}">${p.status==='published'?'公開':'下書き'}</span></td>

  $('#f_cover').addEventListener('input',()=>setPrev($('#f_cover').value.trim()));
  quill.on('text-change',upd); upd();
  $('#back').onclick=renderPosts;
  $('#save').onclick=async()=>{
    if($('#f_tag').value.trim()){ addTag($('#f_tag').value); $('#f_tag').value=''; }
    const body={ title:$('#f_title').value.trim(), slug:$('#f_slug').value.trim(), category:$('#f_cat').value,
      author:$('#f_author').value, published_at:$('#f_pub').value||null, tags:TAGS, focus_keyword:$('#f_kw').value.trim(),
      cover_image:$('#f_cover').value.trim(), excerpt:$('#f_excerpt').value.trim(), body:quill.root.innerHTML,
      meta_description:$('#f_meta').value.trim(), status:$('#f_status').value };
    if(!body.title){ alert('タイトルを入力してください'); return; }
    const sv=$('#save'); sv.textContent='保存中…';
    const r=await api(id?'/api/posts/'+id:'/api/posts',{method:id?'PUT':'POST',body:JSON.stringify(body)});
    const d=await r.json(); sv.textContent=id?'更新する':'保存する';
    if(r.ok){ $('#msg').textContent='✓ 保存しました'; setTimeout(renderPosts,800); }
    else alert('保存に失敗: '+(d.error||''));
  };
}

function csv(data,head,rowfn,fname){
  const q=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  const lines=[head.join(',')].concat(data.map(r=>rowfn(r).map(q).join(',')));
  const blob=new Blob(['﻿'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=fname; a.click();
}
boot();
</script>
