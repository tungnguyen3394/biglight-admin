<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>BIGLIGHT 管理画面</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<style>
  :root{--navy:#0b3d91;--blue:#1e6fd6;--gold:#f5a623;--ink:#1f2a3a;--muted:#64748b;--line:rgba(0,0,0,.08);--bg:#f4f6f9}
  *{margin:0;box-sizing:border-box}
  body{font-family:"Helvetica Neue","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;color:var(--ink);background:var(--bg)}
  a{color:var(--blue);text-decoration:none}
  button{font-family:inherit}
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#071e46,#0b3d91)}
  .lcard{background:#fff;border-radius:16px;padding:44px 40px;width:100%;max-width:380px;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.3)}
  .lcard .mark{font-size:22px;font-weight:800;color:var(--navy);letter-spacing:4px}
  .lcard .sub{font-size:13px;color:var(--muted);margin:6px 0 28px}
  #gbtn{display:flex;justify-content:center}
  .lerr{color:#e23b3b;font-size:13px;margin-top:16px;min-height:18px}
  #app{display:none;min-height:100vh;grid-template-columns:230px 1fr}
  .side{background:#071e46;color:#cfe0f7;padding:22px 16px;display:flex;flex-direction:column}
  .side .brand{color:#fff;font-weight:800;letter-spacing:3px;font-size:18px;padding:6px 10px 22px}
  .side .brand small{display:block;font-size:11px;color:var(--gold);letter-spacing:2px;font-weight:600;margin-top:2px}
  .nav a{display:flex;align-items:center;gap:10px;color:#cfe0f7;padding:12px 14px;border-radius:10px;font-size:14px;cursor:pointer;margin-bottom:4px}
  .nav a:hover,.nav a.active{background:#ffffff14;color:#fff}
  .nav a .badge{margin-left:auto;background:var(--gold);color:#3d2b00;font-size:11px;font-weight:700;border-radius:20px;padding:1px 8px}
  .side .me{margin-top:auto;border-top:1px solid #ffffff1f;padding-top:16px;font-size:12.5px;color:#aec6ee}
  .side .me img{width:30px;height:30px;border-radius:50%;vertical-align:middle;margin-right:8px}
  .side .logout{display:inline-block;margin-top:12px;color:#9db8e0;font-size:12.5px;cursor:pointer}
  .main{padding:28px 34px;overflow:auto}
  .h1{font-size:22px;color:var(--navy);font-weight:700;margin-bottom:4px}
  .crumb{font-size:12.5px;color:var(--muted);margin-bottom:24px}
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:30px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px}
  .stat .n{font-size:30px;font-weight:800;color:var(--navy)}
  .stat .l{font-size:12.5px;color:var(--muted);margin-top:4px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:14px;padding:26px}
  .panel h3{font-size:16px;color:var(--navy);margin-bottom:6px}
  .panel p{font-size:13.5px;color:var(--muted);line-height:1.8}
  .toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .tab{border:1px solid var(--line);background:#fff;border-radius:20px;padding:7px 16px;font-size:13px;color:var(--muted);cursor:pointer}
  .tab.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;color:var(--ink)}
  .btn.gold{background:var(--gold);border-color:var(--gold);color:#3d2b00;font-weight:700}
  .btn.navy{background:var(--navy);border-color:var(--navy);color:#fff;font-weight:600}
  .tablewrap{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:auto}
  table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:680px}
  th,td{padding:12px 14px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
  th{background:#f1f5fb;color:var(--navy);font-weight:700;white-space:nowrap;font-size:12.5px}
  tr:last-child td{border-bottom:0}
  td .msg{max-width:420px;white-space:pre-wrap;color:#3a4658;line-height:1.6}
  td .msg.clamp{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mtoggle{margin-top:5px;display:inline-block;padding:0;font-size:12px}
  td .sub{color:var(--muted);font-size:12px}
  .pill{font-size:11px;font-weight:700;border-radius:20px;padding:3px 10px}
  .pill.new{background:#fdeccb;color:#9a5b00}.pill.replied{background:#e7eefb;color:var(--navy)}.pill.done{background:#e2f4ea;color:#1c7a47}
  .pill.draft{background:#eceff3;color:#64748b}.pill.published{background:#e2f4ea;color:#1c7a47}.pill.scheduled{background:#fdeccb;color:#9a5b00}
  select.st{font-family:inherit;font-size:12.5px;padding:5px 8px;border:1px solid var(--line);border-radius:8px}
  .del{color:#e23b3b;cursor:pointer;font-size:12.5px;background:none;border:0}
  .lnk{color:var(--blue);cursor:pointer;font-size:12.5px;background:none;border:0;margin-right:10px}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  /* editor form */
  .form{background:#fff;border:1px solid var(--line);border-radius:14px;padding:26px;max-width:1000px}
  .fg{margin-bottom:18px}
  .fg label{display:block;font-size:13px;font-weight:600;color:var(--navy);margin-bottom:6px}
  .fg .hint{font-size:11.5px;color:var(--muted);font-weight:400;margin-left:6px}
  .fg input,.fg textarea,.fg select{width:100%;border:1px solid #cfd8e6;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit}
  .fg textarea{min-height:70px;resize:vertical}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  #qeditor{background:#fff}
  #qeditor .ql-editor{min-height:300px;max-height:520px;overflow-y:auto;resize:vertical}
  .ql-toolbar.ql-snow,.ql-container.ql-snow{border-color:#cfd8e6}
  .ql-container{font-size:15px;font-family:inherit}
  .ql-editor table{border-collapse:collapse;width:100%;margin:10px 0;font-size:13px}
  .ql-editor th,.ql-editor td{border:1px solid #cbd5e1;padding:6px 10px;text-align:left}
  .ql-editor th{background:#f1f5fb;font-weight:700}
  .ql-editor .nbody-tablewrap{overflow-x:auto}
  .mdbox{border:1px dashed #b9c6db;border-radius:10px;background:#f6f9fe;padding:12px 14px;margin-bottom:6px}
  .mdbox .mdhint{font-size:11.5px;color:#5a6b85;margin-bottom:8px;line-height:1.7}
  .mdbox textarea{width:100%;min-height:90px;border:1px solid #cfd8e6;border-radius:8px;padding:10px 12px;font-size:13px;font-family:inherit;resize:vertical}
  .formbtns{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
  .serp{border:1px solid #e3e8ef;border-radius:10px;padding:14px 16px;background:#fff;max-width:600px}
  .serp-url{font-size:12.5px;color:#202124}.serp-title{color:#1a0dab;font-size:18px;line-height:1.3;margin:3px 0}.serp-desc{font-size:13px;color:#4d5156;line-height:1.6}
  .cwarn{color:#e23b3b!important}.cok{color:#1c7a47!important}
  .upbox{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .upbtn{display:inline-block;border:1.5px dashed #bcc8da;border-radius:10px;padding:13px 18px;font-size:13px;color:var(--navy);background:#f7f9fc;cursor:pointer;font-weight:600;white-space:nowrap}
  .upbtn:hover{background:#eef3fb}
  .upprev{width:150px;height:94px;border-radius:8px;object-fit:cover;border:1px solid var(--line);display:none}
  .upprev.on{display:block}
  .tagwrap{display:flex;flex-wrap:wrap;gap:7px;border:1px solid #cfd8e6;border-radius:8px;padding:8px 10px}
  .tagwrap input{border:none;outline:none;flex:1;min-width:130px;font-size:14px;padding:4px;width:auto}
  .chip{display:inline-flex;align-items:center;gap:6px;background:#eef4fc;color:var(--navy);border-radius:16px;padding:4px 6px 4px 11px;font-size:12.5px;font-weight:600}
  .chip b{cursor:pointer;color:#9aa3b2;font-size:14px;line-height:1}
  .tagsug{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
  .tagsug span{font-size:11.5px;color:#5a6b85;background:#f1f5fb;border-radius:14px;padding:3px 10px;cursor:pointer}
  .tagsug span:hover{background:#e2eaf7}
  .seobox{border:1px solid var(--line);border-radius:12px;padding:16px 18px;background:#fbfcfe}
  .seoscore{display:flex;align-items:center;gap:14px;margin-bottom:14px}
  .seoring{font-size:28px;font-weight:800;line-height:1;white-space:nowrap}
  .seobar{flex:1;height:10px;background:#e9eef5;border-radius:6px;overflow:hidden}
  .seobar i{display:block;height:100%;border-radius:6px;transition:width .3s,background .3s}
  .seochk{list-style:none;margin:0;padding:0;display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .seochk li{font-size:12.5px;color:#94a3b8}.seochk li.ok{color:#1c7a47}.seochk li.no{color:#b4884a}
  .catmgr{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px}
  .catmgr .clist{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .catmgr .citem{display:inline-flex;align-items:center;gap:8px;background:#f1f5fb;border-radius:8px;padding:6px 8px 6px 12px;font-size:13px}
  .catmgr .citem .del{font-size:15px;line-height:1}
  .catmgr .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  /* sidebar hamburger + thu gọn */
  #app{transition:grid-template-columns .2s}
  .side .top{display:flex;align-items:center;gap:10px;padding:2px 6px 20px}
  .menu-btn{background:#ffffff14;border:0;color:#fff;width:38px;height:38px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .menu-btn:hover{background:#ffffff2b}
  .side .brand{padding:0}
  .nav a svg,.side svg,.btn svg,.menu-btn svg{flex-shrink:0}
  .nav a svg{opacity:.9}
  #app.collapsed{grid-template-columns:70px 1fr}
  #app.collapsed .side{padding:22px 12px}
  #app.collapsed .side .brand,#app.collapsed .nav a .label,#app.collapsed .nav a .badge,#app.collapsed .me .who,#app.collapsed .me .logout{display:none}
  #app.collapsed .nav a{justify-content:center;padding:12px 0}
  #app.collapsed .me{text-align:center}#app.collapsed .me img{margin:0}
  /* danh sách: 1 hàng, click mở chi tiết */
  tr.clk{cursor:pointer}
  tr.clk:hover td{background:#f5f9ff}
  td.ell{overflow:hidden}
  th.nowrap,td.nowrap{white-space:nowrap}
  .rowline{display:block;max-width:34vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #app.collapsed .rowline{max-width:42vw}
  /* trang chi tiết */
  .backbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
  .detail{background:#fff;border:1px solid var(--line);border-radius:14px;padding:8px 26px;max-width:920px}
  .drow{display:flex;gap:18px;padding:15px 0;border-bottom:1px solid var(--line);font-size:14px}
  .drow:last-child{border-bottom:0}
  .dk{width:150px;flex-shrink:0;color:var(--muted);font-weight:600}
  .dv{flex:1;white-space:pre-wrap;line-height:1.75;color:var(--ink);word-break:break-word}
  .btn.red{color:#e23b3b;border-color:#f3c4c4}.btn.red:hover{background:#fdf0f0}
  .btn svg,.menu-btn svg{vertical-align:middle}
  .btn{display:inline-flex;align-items:center;gap:6px}
  /* 資料 materials */
  .matgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .matcard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;display:flex;flex-direction:column;gap:9px}
  .matcard .mt{font-weight:700;color:var(--ink);font-size:14.5px;line-height:1.4}
  .matcard .mc{display:inline-block;font-size:11.5px;font-weight:700;color:var(--navy);background:#eef4fc;border-radius:14px;padding:2px 10px;align-self:flex-start}
  .matcard .mmeta{font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:8px 14px}
  .matcard .mact{display:flex;gap:8px;margin-top:4px}
  .sendbox{background:#f7faff;border:1px solid #d9e6fb;border-radius:12px;padding:18px 20px;margin-top:18px}
  .sendbox h3{font-size:15px;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .matpick{display:flex;align-items:center;gap:12px;padding:10px 4px;border-bottom:1px solid var(--line);font-size:13.5px}
  .matpick:last-of-type{border-bottom:0}
  .matpick .pn{font-weight:600}.matpick .pc{font-size:11.5px;color:var(--navy);background:#eef4fc;border-radius:12px;padding:1px 9px}
  .sent-badge{font-size:12px;color:#1c7a47;background:#e2f4ea;border-radius:16px;padding:3px 11px;font-weight:700}
  /* ===== SEO標準エディタ ===== */
  .epanel{background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:16px;overflow:hidden}
  .epanel-h{display:flex;align-items:center;gap:9px;padding:15px 20px;cursor:pointer;user-select:none;font-weight:700;color:var(--navy);font-size:15px}
  .epanel-h .ep-badge{margin-left:auto;font-size:11.5px;font-weight:700;color:var(--muted);background:#f1f5fb;border-radius:12px;padding:2px 10px}
  .epanel-h .ep-ar{transition:transform .2s;color:#94a3b8}
  .epanel.closed .ep-ar{transform:rotate(-90deg)}
  .epanel.closed .epanel-b{display:none}
  .epanel-b{padding:6px 20px 20px}
  .efg{margin-bottom:16px}
  .efg>label{display:block;font-size:13px;font-weight:700;color:#334155;margin-bottom:6px}
  .efg .cnt{float:right;font-weight:600;color:#94a3b8}
  .efg input,.efg textarea,.efg select{width:100%;border:1px solid #e2e8f0;border-radius:9px;padding:10px 13px;font-size:14px;font-family:inherit;background:#f8fafc}
  .efg input:focus,.efg textarea:focus{background:#fff;outline:2px solid #cfe0f7;border-color:#9dc0ee}
  .efg textarea{resize:vertical;min-height:64px;line-height:1.6}
  .seg{display:inline-flex;gap:6px;flex-wrap:wrap}
  .seg button{border:1px solid #e2e8f0;background:#fff;border-radius:9px;padding:8px 16px;font-size:13px;font-weight:600;color:#64748b;cursor:pointer}
  .seg button.on{background:#e23b3b;border-color:#e23b3b;color:#fff}
  .seg.blue button.on{background:var(--navy);border-color:var(--navy)}
  .tgl{display:inline-flex;align-items:center;gap:9px;cursor:pointer;font-size:13.5px;font-weight:600;color:#334155}
  .tgl input{display:none}
  .tgl .sw{width:40px;height:22px;background:#cbd5e1;border-radius:20px;position:relative;transition:.2s;flex-shrink:0}
  .tgl .sw:after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.2s}
  .tgl input:checked+.sw{background:#16a34a}.tgl input:checked+.sw:after{left:20px}
  .btoolbar{display:flex;flex-wrap:wrap;gap:6px;background:#f8fafc;border:1px solid #e2e8f0;border-bottom:0;border-radius:9px 9px 0 0;padding:8px}
  .btoolbar button{border:1px solid #e2e8f0;background:#fff;border-radius:7px;padding:5px 11px;font-size:12.5px;font-weight:600;color:#475569;cursor:pointer}
  .btoolbar button:hover{background:#eef3fb;color:var(--navy)}
  #qeditor .ncallout{border-left:4px solid var(--blue);background:#eef4fc;border-radius:8px;padding:12px 16px;margin:10px 0}
  #qeditor .nbtn{display:inline-block;background:#e23b3b;color:#fff;padding:10px 22px;border-radius:9px;font-weight:700;margin:6px 0}
  #qeditor .nacc{border:1px solid #e2e8f0;border-radius:8px;margin:10px 0;padding:10px 14px}
  #qeditor .nacc>summary{font-weight:700;cursor:pointer}
  #qeditor .ncheck{list-style:none;padding-left:22px}#qeditor .ncheck li{position:relative}#qeditor .ncheck li:before{content:"✔";position:absolute;left:-20px;color:#16a34a}
  #qeditor .nembed{position:relative;padding-bottom:56.25%;height:0;margin:12px 0}#qeditor .nembed iframe{position:absolute;inset:0;width:100%;height:100%;border:0;border-radius:8px}
  #qeditor .ntoc-here::before{content:"目次（公開時に自動生成されます）";display:block;color:var(--navy);background:#eef4fc;border:1px dashed #9dc0ee;padding:9px 13px;border-radius:8px;font-size:12.5px;font-weight:700}
  .repeat-item{border:1px solid #e2e8f0;border-radius:10px;padding:14px;margin-bottom:10px;background:#f8fafc;position:relative}
  .repeat-item .rm{position:absolute;top:10px;right:10px;color:#e23b3b;cursor:pointer;font-size:12.5px;font-weight:600;background:none;border:0}
  .addrow{width:100%;border:1px dashed #cbd5e1;background:#fff;border-radius:10px;padding:11px;font-size:13px;font-weight:600;color:var(--navy);cursor:pointer}
  .jgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .analy{display:flex;align-items:center;gap:12px;font-size:12.5px;color:#64748b;padding:7px 0;border-top:1px solid #f1f5f9}
  .analy .an-k{width:130px;flex-shrink:0;color:#475569;font-weight:600}
  .analy .an-bar{flex:1;height:6px;background:#eef2f7;border-radius:4px;overflow:hidden}.analy .an-bar i{display:block;height:100%;background:#1e6fd6}
  .analy .an-v{width:120px;text-align:right;flex-shrink:0}
  .scorecard{display:flex;gap:22px;align-items:center;flex-wrap:wrap}
  .ring{--v:0;--c:#e23b3b;width:110px;height:110px;border-radius:50%;flex-shrink:0;background:conic-gradient(var(--c) calc(var(--v)*1%),#eef2f7 0);display:flex;align-items:center;justify-content:center;position:relative}
  .ring:after{content:"";position:absolute;inset:11px;background:#fff;border-radius:50%}
  .ring b{position:relative;z-index:1;font-size:28px;color:var(--c)}.ring b small{font-size:12px;color:#94a3b8;font-weight:600}
  .chk2{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px}
  .chk2 li{list-style:none;font-size:13px;color:#94a3b8;display:flex;align-items:center;gap:8px}
  .chk2 li.ok{color:#16a34a}.chk2 li .x{font-weight:800}
  .estatusbar{position:sticky;bottom:0;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 18px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:8px;box-shadow:0 -6px 20px rgba(0,0,0,.05);z-index:10}
  .btn.pub{background:#e23b3b;border-color:#e23b3b;color:#fff;font-weight:700}
  @media(max-width:760px){.jgrid,.chk2{grid-template-columns:1fr}}
  /* ===== 営業メール管理 ===== */
  .sub{color:var(--muted);font-size:12px}
  .smtab{font-weight:600}
  .cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px}
  .scard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.05);display:flex;flex-direction:column;gap:6px}
  .badge{display:inline-block;font-size:11px;font-weight:700;color:var(--navy);background:#eef4fc;border-radius:14px;padding:2px 10px;flex-shrink:0}
  .chipcat{cursor:pointer;padding:5px 12px;border-radius:999px;font-size:11.5px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--muted);display:inline-flex;align-items:center;gap:5px}
  .chipcat.on{border-color:var(--navy);background:#eef4fc;color:var(--navy)}
  .chipcat.dash{border-style:dashed;border-color:var(--blue);color:var(--blue)}
  .varchip{cursor:pointer;font-size:10.5px;background:#f1f5fb;border:1px solid var(--line);border-radius:6px;padding:2px 7px;color:var(--blue);font-family:monospace}
  .varchip span{color:var(--muted);font-family:inherit}
  .selin{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:12.5px;background:#fff;color:var(--ink);font-family:inherit}
  .addmenu{position:relative}
  .addmenu>summary{list-style:none;cursor:pointer}
  .addmenu>summary::-webkit-details-marker{display:none}
  .addmenu .menu{position:absolute;z-index:50;top:calc(100% + 4px);left:0;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.15);min-width:210px;padding:6px}
  .addmenu .menu-item{display:flex;align-items:center;gap:8px;padding:9px 11px;font-size:13px;color:var(--ink);cursor:pointer;border-radius:8px}

function toLocalInput(d){ if(!d) d=new Date(); const t=new Date(d); const p=n=>String(n).padStart(2,'0'); return `${t.getFullYear()}-${p(t.getMonth()+1)}-${p(t.getDate())}T${p(t.getHours())}:${p(t.getMinutes())}`; }
function seoScore(d){
  const t=(d.title||''), m=(d.meta||''), kw=(d.kw||'').trim().toLowerCase(), body=(d.body||'').toLowerCase(), slug=(d.slug||'').toLowerCase();
  const c=[
    {k:'タイトル 30〜60字', ok:t.length>=30&&t.length<=60, w:20},
    {k:'メタ説明 80〜120字', ok:m.length>=80&&m.length<=120, w:20},

    {k:'URLにキーワード', ok:!!kw&&slug.indexOf(kw.replace(/\s+/g,'-'))>=0, w:15},
  ];
  const score=c.reduce((s,x)=>s+(x.ok?x.w:0),0);
  return {score, checks:c};
}
// Markdown (ChatGPT等) -> HTML : 見出し/太字/箇条書き/表 を自動変換 -> SEO最適化
function md2html(md){
  const lines=String(md||'').replace(/\r/g,'').split('\n');
  let html='',list=null,i=0;
  const closeList=()=>{ if(list){ html+='</'+list+'>'; list=null; } };
  const inl=s=>{ s=String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,'<a href="$2">$1</a>');
    return s; };
  const cells=row=>row.replace(/^\s*\|/,'').replace(/\|\s*$/,'').split('|').map(c=>c.trim());
  while(i<lines.length){ const line=lines[i].trim(); let m;
    if(!line){ closeList(); i++; continue; }
    // 表（| ... | の行 + 区切り行 |---|---| ）
    if(/^\|.*\|$/.test(line) && i+1<lines.length && /^\|[\s:|-]+\|$/.test(lines[i+1].trim())){
      closeList();
      const head=cells(line); i+=2; let body='';
      while(i<lines.length && /^\|.*\|$/.test(lines[i].trim())){ const c=cells(lines[i].trim()); body+='<tr>'+c.map(x=>'<td>'+inl(x)+'</td>').join('')+'</tr>'; i++; }
      html+='<table class="nbody-table"><thead><tr>'+head.map(h=>'<th>'+inl(h)+'</th>').join('')+'</tr></thead><tbody>'+body+'</tbody></table>';
      continue;
    }
    if(m=line.match(/^#{3,}\s+(.*)/)){ closeList(); html+='<h3>'+inl(m[1])+'</h3>'; i++; continue; }
    if(m=line.match(/^##\s+(.*)/)){ closeList(); html+='<h2>'+inl(m[1])+'</h2>'; i++; continue; }
    if(m=line.match(/^#\s+(.*)/)){ closeList(); html+='<h2>'+inl(m[1])+'</h2>'; i++; continue; }
    if(m=line.match(/^[-*・]\s+(.*)/)){ if(list!=='ul'){closeList();html+='<ul>';list='ul';} html+='<li>'+inl(m[1])+'</li>'; i++; continue; }
    if(m=line.match(/^\d+[.)]\s+(.*)/)){ if(list!=='ol'){closeList();html+='<ol>';list='ol';} html+='<li>'+inl(m[1])+'</li>'; i++; continue; }
    if(m=line.match(/^>\s+(.*)/)){ closeList(); html+='<blockquote>'+inl(m[1])+'</blockquote>'; i++; continue; }
    if(m=line.match(/^【(.+)】$/)){ closeList(); html+='<h3>'+inl(m[1])+'</h3>'; i++; continue; }
    closeList(); html+='<p>'+inl(line)+'</p>'; i++;
  }
  closeList(); return html;
}

  }
  TableBlot.blotName='bltable'; TableBlot.tagName='div'; TableBlot.className='nbody-tablewrap';
  Quill.register(TableBlot,true);
  _tableBlotReady=true;
}

async function bulkDelete(base, after){ const ids=checkedIds(); if(!ids.length){ alert('行を選択してください（左のチェックボックス）'); return; } if(!confirm('選択した '+ids.length+' 件を削除しますか？'))return; for(const id of ids){ try{ await api(base+'/'+id,{method:'DELETE'}); }catch(e){} } after(); }

async function showLogin(){
  document.body.classList.remove('app-on');

  // ===== 分析 + チェックリスト + スコア =====

  function analyze(){
    const bd=quill?quill.root.innerHTML:''; const tmp=document.createElement('div'); tmp.innerHTML=bd; const text=(tmp.textContent||'').replace(/\s+/g,'');

      h2:(bd.match(/<h2/gi)||[]).length, h3:(bd.match(/<h3/gi)||[]).length, intl:tmp.querySelectorAll('a[href^="/"]').length, extl:tmp.querySelectorAll('a[href^="http"]').length,

  }
  function upd(){ const d=analyze();
    $('#sp_title').textContent=(d.seo||d.title)||'タイトル'; $('#sp_desc').textContent=d.meta||$('#f_excerpt').value||'検索結果に表示される説明文がここに表示されます。'; $('#sp_slug').textContent=d.slug||'slug';

    $('#analyBox').innerHTML=`
      <div class="analy"><div class="an-k">タイトル長</div><div class="an-bar"><i style="width:${bar(d.seo.length||d.title.length,60)}%"></i></div><div class="an-v">${d.seo.length||d.title.length} 文字</div></div>
      <div class="analy"><div class="an-k">ディスクリプション長</div><div class="an-bar"><i style="width:${bar(d.meta.length,160)}%"></i></div><div class="an-v">${d.meta.length} 文字</div></div>
      <div class="analy"><div class="an-k">キーワード密度</div><div class="an-bar"><i style="width:${bar(d.dens,3)}%"></i></div><div class="an-v">${d.dens.toFixed(1)} %</div></div>
      <div class="analy"><div class="an-k">見出し構成</div><div class="an-bar"><i style="width:${d.h2||d.h3?100:0}%"></i></div><div class="an-v">H1:${d.title?1:0} H2:${d.h2} H3:${d.h3}</div></div>
      <div class="analy"><div class="an-k">画像SEO（ALT）</div><div class="an-bar"><i style="width:${d.hasImg&&d.altOk?100:0}%"></i></div><div class="an-v">${d.hasImg?(d.altOk?'ALT付き':'ALT不足'):'画像なし'}</div></div>
      <div class="analy"><div class="an-k">内部リンク</div><div class="an-bar"><i style="width:${bar(d.intl,3)}%"></i></div><div class="an-v">${d.intl} 本</div></div>`;
    // チェックリスト + スコア
    const results=CHK.map(([k,fn])=>({k,ok:!!fn(d)})); const pass=results.filter(r=>r.ok).length; const score=Math.round(pass/CHK.length*100);

    $('#chkList').innerHTML=results.map(r=>`<li class="${r.ok?'ok':''}"><span class="x">${r.ok?'✓':'✕'}</span> ${esc(r.k)}</li>`).join('');

  ['f_title','f_seotitle','f_meta','f_slug','f_kw','f_cover','f_coveralt','f_canon','f_ogimg','f_excerpt'].forEach(x=>{ const el=$('#'+x); if(el) el.addEventListener('input',upd); });

      canonical_url:$('#f_canon').value.trim(), robots_index:robotsIdx, robots_follow:robotsFol,
      cover_image:$('#f_cover').value.trim(), cover_alt:$('#f_coveralt').value.trim(), cover_caption:$('#f_covercap').value.trim(), cover_title:$('#f_covertitle').value.trim(), lazy_load:$('#f_lazy').checked,
      og_title:$('#f_ogtitle').value.trim(), og_description:$('#f_ogdesc').value.trim(), og_image:$('#f_ogimg').value.trim(),
      excerpt:$('#f_excerpt').value.trim(), body:quill.root.innerHTML,
      faq:FAQS.filter(f=>f.q||f.a), cta_blocks:CTAS.filter(c=>c.label||c.url),

      related_articles:$('#f_relart').value.trim(), related_category:$('#f_relcat').value.trim(), download_pdf:$('#f_dlpdf').value.trim(), consult_block:$('#f_consult').checked,
      pinned:$('#f_pinned').checked, featured:$('#f_featured').checked, status:status };

  async function save(status){

function _smAttChecks(cls,selIds){
  const sel=new Set((selIds||[]).map(String));
  if(!M.mats.length) return `<div class="sub" style="padding:6px 2px">資料は「添付資料」タブで登録できます。</div>`;
  const groups=M.fileCats.map(c=>({c,files:M.mats.filter(f=>(f.category||'その他')===c)})).filter(g=>g.files.length);
  const other=M.mats.filter(f=>!M.fileCats.includes(f.category||'その他')); if(other.length) groups.push({c:'その他',files:other});
  return groups.map(g=>{ const open=g.files.some(f=>sel.has(String(f.id)));
    return `<div class="attgrp">
      <div class="attgrp-h" onclick="const b=this.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'':'none';this.querySelector('.arw').textContent=o?'▾':'▸'"><span class="arw">${open?'▾':'▸'}</span>${IC.tag} ${esc(g.c)}<span class="sub" style="font-weight:600">${g.files.length}件</span></div>
      <div style="display:${open?'':'none'};padding:7px 10px"><div style="display:flex;flex-wrap:wrap;gap:8px">${g.files.map(f=>`<label class="attpick"><input type="checkbox" class="${cls}" value="${f.id}" ${sel.has(String(f.id))?'checked':''}> ${_smMatType(f)==='link'?IC.ext:IC.file} ${esc(f.name)}</label>`).join('')}</div></div>
    </div>`; }).join('');
}

async function smSend(){

  if(!d.subject.trim()||!d.bodyRaw.trim()){ alert('件名・本文を入力してください。'); return; }
  if(!d.recip.email){ alert('この宛先はメール未登録です。'); return; }
  if(!confirm(d.recip.email+' へ送信しますか？')) return;
  const t=M.tpls.find(x=>String(x.id)===String($('#smcTpl').value));
  const payload={to:d.recip.email,toName:d.recip.name||d.recip.company,recipientKey:d.recip.key,subject:d.subject,body:d.body,attachIds:d.fileIds,templateId:t?t.id:null,templateName:t?t.name:'',att:d.atts.map(m=>m.name).join(', ')};
  const info=$('#smcInfo'); if(info){ info.style.color='var(--muted)'; info.textContent='送信中…'; }
  try{
    const r=await api('/api/mail/send',{method:'POST',body:JSON.stringify(payload)}); const j=await r.json();

  }catch(e){ if(info){ info.style.color='#e23b3b'; info.textContent='送信に失敗しました'; } }
}

function smBulkList(){

  const ctx=window._smBulkCtx||{};

  const linkAtts=atts.filter(m=>_smMatType(m)==='link'), fileIds=atts.filter(m=>m.filename).map(m=>m.id);
  window._smBulkRows=keys.map(k=>{ const p=_smRecip(k);
    let body=smFillVars(ctx.body,p)+(sig?'\n\n'+smFillVars(sig.body,p):'');
    if(linkAtts.length) body+='\n\n【添付資料（リンク）】\n'+linkAtts.map(m=>'・'+m.name+': '+m.link_url).join('\n');
    return {p,subject:smFillVars(ctx.subj,p),body,fileIds,att:atts.map(m=>m.name).join(', '),tpl:t}; });
  openModal(`<h3>${IC.send} 一括送信リスト（${keys.length}件）</h3>

    </table></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal();reloadMail()">完了・閉じる</button></div>`);

async function smBulkSend(i){
  const r=(window._smBulkRows||[])[i]; if(!r)return;
  const btn=document.querySelector('#smbr-'+i+' button'); if(btn){ btn.disabled=true; btn.textContent='送信中…'; }
  try{
    const resp=await api('/api/mail/send',{method:'POST',body:JSON.stringify({to:r.p.email,toName:r.p.name||r.p.company,recipientKey:r.p.key,subject:r.subject,body:r.body,attachIds:r.fileIds,templateId:r.tpl?r.tpl.id:null,templateName:r.tpl?r.tpl.name:'',att:r.att,note:'一括送信'})});
    const tr=document.getElementById('smbr-'+i);
    if(resp.ok){ if(tr) tr.style.opacity='.55'; if(btn){ btn.innerHTML=IC.check+' 済'; btn.style.background='#94a3b8'; btn.style.borderColor='#94a3b8'; } }
    else { const j=await resp.json(); if(btn){ btn.disabled=false; btn.textContent='再送'; } alert('失敗: '+(j.error||'')); }
  }catch(e){ if(btn){ btn.disabled=false; btn.textContent='再送'; } alert('送信に失敗しました'); }
}

function doPost(e) {
  try {
    var p = JSON.parse(e.postData.contents);
    var opts = { name: 'BIGLIGHT 特定技能担当' };
    if (p.cc)  opts.cc  = p.cc;
    if (p.bcc) opts.bcc = p.bcc;
    if (p.attachments && p.attachments.length) {
      opts.attachments = p.attachments.map(function(a){
        return Utilities.newBlob(Utilities.base64Decode(a.dataBase64), a.mimeType || 'application/octet-stream', a.name || 'file');
      });
    }
    GmailApp.sendEmail(p.to, p.subject || '', p.body || '', opts);
    return ContentService.createTextOutput(JSON.stringify({ ok: true })).setMimeType(ContentService.MimeType.JSON);
  } catch (err) {
    return ContentService.createTextOutput(JSON.stringify({ ok: false, error: String(err) })).setMimeType(ContentService.MimeType.JSON);
  }
}`;

async function saveProfile(email){
  const role=document.getElementById('ur_'+email).value, status=document.getElementById('us_'+email).value, mail=document.getElementById('um_'+email).checked;
  const r=await api('/api/profiles/'+encodeURIComponent(email),{method:'PUT',body:JSON.stringify({role,status,mail_enabled:mail})});
  if(r.ok) renderUsers(); else alert('保存に失敗しました');
}
async function delProfile(email){
  if(!confirm(email+' を削除しますか？（次回ログインで再度承認待ちになります）'))return;
  const r=await api('/api/profiles/'+encodeURIComponent(email),{method:'DELETE'});
  if(r.ok) renderUsers(); else { const d=await r.json(); alert(d.error||'削除に失敗しました'); }
}
async function savePerms(){
  const rp=JSON.parse(JSON.stringify(PERM.rolePerms||{}));
  document.querySelectorAll('.pm').forEach(c=>{ const r=c.dataset.r,a=c.dataset.a,act=c.dataset.c; rp[r]=rp[r]||{}; rp[r][a]=rp[r][a]||{}; rp[r][a][act]=c.checked; });
  const resp=await api('/api/perms',{method:'PUT',body:JSON.stringify({rolePerms:rp})});
  const m=$('#permMsg'); if(resp.ok){ PERM.rolePerms=rp; m.style.color='#1c7a47'; m.textContent='✓ 権限を保存しました（各ユーザーは次回操作から反映）'; } else { m.style.color='#e23b3b'; m.textContent='保存に失敗しました'; }
}
async function saveMyGas(){
  const url=$('#myGas').value.trim();
  const resp=await api('/api/me/gas',{method:'POST',body:JSON.stringify({gas_url:url})});
  const m=$('#gasMsg'); const d=await resp.json();
  if(resp.ok){ PERM.gas_url=url; PERM.gas_set=!!url; if(CURRENT_USER)CURRENT_USER.gas_url=url; m.style.color='#1c7a47'; m.textContent='✓ 保存しました'; } else { m.style.color='#e23b3b'; m.textContent=d.error||'保存に失敗'; }
}
/* メール設定モーダル（各スタッフが自分のGAS URLを登録） */

      <div class="sub">メールは<b>あなた自身のGmail</b>から送信されます。GASを設定するとGmail送信、未設定ならサーバSMTPで送信されます。</div>

async function saveSetGas(){
  const url=$('#mset_gas').value.trim();
  const resp=await api('/api/me/gas',{method:'POST',body:JSON.stringify({gas_url:url})}); const d=await resp.json();
  if(resp.ok){ PERM.gas_url=url; PERM.gas_set=!!url; if(CURRENT_USER)CURRENT_USER.gas_url=url; closeModal(); alert('メール設定を保存しました。'); }
  else alert(d.error||'保存に失敗しました');
}

function csv(data,head,rowfn,fname){
  const q=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  const lines=[head.join(',')].concat(data.map(r=>rowfn(r).map(q).join(',')));
  const blob=new Blob(['﻿'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=fname; a.click();
}
