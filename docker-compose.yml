# Admin biglight.jp — chạy sau Caddy (mạng "web" dùng chung ở ~/infra)
services:
  admin:
    build: ./backend
    container_name: biglight-admin
    restart: unless-stopped
    env_file: .env
    volumes:
      - /var/www/biglight:/site          # ghi trang お知らせ tĩnh vào web (biglight.jp/news/)
    labels:
      caddy: admin.biglight.jp
      caddy.reverse_proxy: "{{upstreams 3000}}"
    networks: [web]

networks:
  web:
    external: true
